<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orlando Weekly</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
  <div class="promo">
    <div class="promo-line">
      <a href="home.html" class="promo-link">
        BEST OF ORLANDO® NOMINATION BALLOT IS OPEN THROUGH MAY 6!
      </a>
    </div>
  </div>

  <header id="main-header">

    <div class="container">
      <div id="top-header">
        <div id="social">
          <a href="#" aria-label="Facebook">
            <i class="fa-brands fa-facebook-f"></i>
          </a>

          <a href="#" aria-label="Bluesky">
            <i class="fa-brands fa-bluesky"></i>
          </a>

          <a href="#" aria-label="TikTok">
            <i class="fa-brands fa-tiktok"></i>
          </a>

          <a href="#" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>

          <a href="#" aria-label="Apple News">
            <i class="fa-brands fa-apple"></i>
          </a>

          <a href="#" aria-label="Google News">
            <i class="fa-brands fa-google"></i>
          </a>

        </div>

        <div id="foto-logo">
          <a href="home.html" class="logo-link">
            <img src="photos/Mainlogo.jpg" alt="Orlando Weekly Logo">
          </a>
        </div>

        <div id="navbar">
          <a href="#" class="newsletter-btn">Newsletter</a>
          <a href="#">Support</a>
          <a href="#">Add Your Event</a>
          <a href="#" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
        </div>

      </div>


    </div>

  </header>

</body>

</html>
